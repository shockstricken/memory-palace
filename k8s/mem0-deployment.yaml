# Secret for mem0 API key and sensitive config
# Replace values with your actual base64-encoded secrets
apiVersion: v1
kind: Secret
metadata:
  name: mem0-secrets
  namespace: memory-palace
  labels:
    app.kubernetes.io/name: mem0-mcp
    app.kubernetes.io/part-of: memory-palace
type: Opaque
stringData:
  # API key for securing the mem0 REST API + MCP endpoints
  API_KEY: "change-me-to-a-strong-random-key"
  # Disable auth for internal cluster use (set to "false" if you want auth)
  AUTH_DISABLED: "true"
---
# mem0 MCP Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mem0-mcp
  namespace: memory-palace
  labels:
    app.kubernetes.io/name: mem0-mcp
    app.kubernetes.io/part-of: memory-palace
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mem0-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mem0-mcp
        app.kubernetes.io/part-of: memory-palace
    spec:
      containers:
        - name: mem0-mcp
          image: mem0/openmemory-mcp:latest
          ports:
            - containerPort: 8765
              name: http
              protocol: TCP
          env:
            - name: VECTOR_STORE
              value: "chroma"
            - name: CHROMA_HOST
              value: "chromadb.memory-palace.svc.cluster.local"
            - name: CHROMA_PORT
              value: "8000"
            - name: AUTH_DISABLED
              valueFrom:
                secretKeyRef:
                  name: mem0-secrets
                  key: AUTH_DISABLED
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: mem0-secrets
                  key: API_KEY
            # If using OpenAI embeddings instead of Ollama:
            # - name: OPENAI_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: mem0-secrets
            #       key: OPENAI_API_KEY
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
---
# mem0 MCP Service (ClusterIP)
apiVersion: v1
kind: Service
metadata:
  name: mem0-mcp
  namespace: memory-palace
  labels:
    app.kubernetes.io/name: mem0-mcp
    app.kubernetes.io/part-of: memory-palace
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mem0-mcp
  ports:
    - name: http
      port: 8765
      targetPort: http
      protocol: TCP
